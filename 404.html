<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Box Cat Games</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        .error-code {
            font-size: clamp(4rem, 15vw, 6rem);
            font-weight: 900;
            line-height: 1;
        }

        /* Cat Image Styling */
        .cat-container {
            width: 280px;
            height: 280px;
            margin-bottom: 2rem;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .cat-404-image {
            max-width: 100%;
            height: auto;
            display: block;
        }
    </style>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main>
        <!-- Autofocusing the heading allows screen readers to announce the error immediately -->
        <h1 id="error-heading" class="error-code" tabindex="-1">404</h1>

        <div class="cat-container">
            <img src="assets/BigBoxCat.gif" 
                 alt="A big cat sitting in a broken cardboard box, swishing his tail." 
                 class="cat-404-image"
                 width="256"
                 height="256">
        </div>

        <h2>What do we have here?</h2>
        <p>Look at you. Requesting pages that don't exist.<br/>
            The cat is judging your terrible navigation skills.</p>

        <a href="index.html" class="button">Take Me Home</a>
    </main>

    <script>
        // Ensure screen readers process the page context update right away
        window.addEventListener('DOMContentLoaded', () => {
            const errorHeading = document.getElementById('error-heading');
            if (errorHeading) {
                errorHeading.focus();
            }
        });
    </script>
</body>
</html>
