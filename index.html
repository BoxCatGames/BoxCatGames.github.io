<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Welcome to Box Cat Games, an independent game development studio creating charming indie games.">
    <meta name="keywords" content="Box Cat Games, indie games, game development, independent studio">
    <meta name="author" content="Box Cat Games">
    
    <meta property="og:type" content="website">
    <meta property="og:title" content="Box Cat Games | Indie Game Studio">
    <meta property="og:description" content="Charming indie games made with love.">
    <meta property="og:image" content="assets/cat_in_box.png">

    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:title" content="Box Cat Games | Indie Game Studio">
    <meta property="twitter:description" content="Charming indie games made with love.">

    <title>Box Cat Games | Home</title>

    <link rel="icon" type="image/png" href="favicon.png">
    
    <style>
        /* Modern Reset & Accessible Defaults */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #121212; /* Dark theme with high contrast */
            color: #f5f5f5;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 1rem;
        }

        /* Skip to content link for keyboard navigation navigation */
        .skip-link {
            position: absolute;
            top: -40px;
            left: 0;
            background: #ffcc00;
            color: #000;
            padding: 8px;
            z-index: 100;
            transition: top 0.2s;
        }

        .skip-link:focus {
            top: 0;
        }

        /* Main Container */
        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            flex-grow: 1;
            max-width: 800px;
            width: 100%;
        }

        /* Typography & Layout */
        .studio-title {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 800;
            margin-bottom: 1.5rem;
            letter-spacing: -0.02em;
            outline: none; /* Accessible focus styling below */
        }

        /* Screen readers sometimes stutter if focused text gets an aggressive outline, 
           so we give it a clean, highly visible custom focus state */
        .studio-title:focus {
            outline: 2px dashed #ffcc00;
            outline-offset: 8px;
        }

        .logo-container {
            margin-bottom: 2rem;
            max-width: 100%;
        }

        .studio-logo {
            max-width: 224px;
            width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
            border-radius: 8px;
        }

        .tagline {
            font-size: clamp(1.2rem, 4vw, 1.6rem);
            color: #b3b3b3;
            max-width: 600px;
            font-weight: 400;
        }

        /* Footer */
        footer {
            text-align: center;
            width: 100%;
            padding-top: 2rem;
            font-size: 0.9rem;
            color: #757575;
        }

        /* Respect User Preferences for Motion */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation: none !important;
                transition: none !important;
            }
        }
    </style>
</head>
<body>

    <a href="#main-content" class="skip-link">Skip to main content</a>

    <main id="main-content">
        <h1 id="studio-name" class="studio-title" tabindex="-1">
            Box Cat Games
        </h1>

        <div class="logo-container">
            <img src="assets/cat_in_box.png" 
                 alt="Box Cat Games official logo: A pixel art cat sitting inside a cardboard box" 
                 class="studio-logo"
                 width="224" 
                 height="224">
        </div>

        <p class="tagline">
            Small games. Big cats.
        </p>
    </main>

    <footer>
        <p>&copy; <span id="year"></span> Box Cat Games. All rights reserved.</p>
    </footer>

    <script>
        // Accessibility Focus Handling on Load
        window.addEventListener('DOMContentLoaded', () => {
            const studioName = document.getElementById('studio-name');
            if (studioName) {
                // Focus the heading so screen readers announce the site name immediately on entry
                studioName.focus();
            }

            // Automatically keep the copyright year up to date
            const yearSpan = document.getElementById('year');
            if (yearSpan) {
                yearSpan.textContent = new Date().getFullYear();
            }
        });
    </script>
</body>
</html>
